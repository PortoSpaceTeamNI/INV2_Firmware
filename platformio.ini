; INV2_Firmware -- root PlatformIO project (monorepo, in progress)
;
; This root project currently hosts only the host-side `native` test environment,
; which exercises the shared lib/rocket_core/ code (frame parser, enums). The
; per-board environments ([env:obc], [env:hydra], ...) are being migrated here one
; at a time -- see Documentation/monorepo-shared-lib-refactor.md. Until a board is
; migrated it keeps building from its own subdirectory (OBC/, HYDRA/, ...).

[platformio]
; Keep PlatformIO from treating the not-yet-migrated board folders as part of this
; project's build. Only the native test env is active at the root for now.

; Host-side unit tests for the shared protocol core. No board, no Arduino.
[env:native]
platform = native
test_framework = unity
build_flags = -std=c++11
