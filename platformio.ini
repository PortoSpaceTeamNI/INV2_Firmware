; INV2_Firmware — monorepo PlatformIO project
;
; One environment per physical board instance + a native host test environment.
; All board sources live under src/<board>/; all shared libraries live under lib/.
;
; Common operations:
;   pio run -e cortex          build CORTEX
;   pio run -e hydra_uf        build HYDRA upper-feed node
;   pio run -e lift_tank       build LIFT tank node
;   pio run -e cortex -t upload  build + flash CORTEX
;   pio device monitor -e cortex  serial monitor (115200 baud everywhere)
;   pio run                    build ALL board instances
;   pio test -e native         host-side protocol unit tests (9/9)

; ---------------------------------------------------------------------------
; Shared RP2040 / Arduino base
; ---------------------------------------------------------------------------
[rp2040_base]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico
framework = arduino
monitor_speed = 115200

; ---------------------------------------------------------------------------
; CORTEX — flight computer, RS485 master, FreeRTOS
; ---------------------------------------------------------------------------
[env:cortex]
extends = rp2040_base
build_src_filter = -<*> +<cortex/>
build_flags =
    -Isrc/cortex
    -DPIO_FRAMEWORK_ARDUINO_ENABLE_FREERTOS
upload_protocol = cmsis-dap
; Libs auto-discovered from lib/: rocket_core, Crc, LoRa

; ---------------------------------------------------------------------------
; HYDRA — hydraulic/actuation slave
; Three physical instances: UF (upper feed), LF (lower feed), FS (fill station)
; Flash the correct env for each unit; DEFAULT_ID is injected at compile time.
; ---------------------------------------------------------------------------
[hydra_base]
extends = rp2040_base
build_src_filter = -<*> +<hydra/>
build_flags = -Isrc/hydra
upload_protocol = cmsis-dap
; Libs auto-discovered from lib/: rocket_core, Crc, AD5593R, MAX31856, SPI

[env:hydra_uf]
extends = hydra_base
build_flags = ${hydra_base.build_flags} -DDEFAULT_ID=HYDRA_UF_ID

[env:hydra_lf]
extends = hydra_base
build_flags = ${hydra_base.build_flags} -DDEFAULT_ID=HYDRA_LF_ID

[env:hydra_fs]
extends = hydra_base
build_flags = ${hydra_base.build_flags} -DDEFAULT_ID=HYDRA_FS_ID

; ---------------------------------------------------------------------------
; LIFT — load-cell slave, FreeRTOS
; Three physical instances: TANK, BOTTLE, THRUST
; Flash the correct env for each unit; MY_ID is injected at compile time.
; ---------------------------------------------------------------------------
[lift_base]
extends = rp2040_base
build_src_filter = -<*> +<lift/>
build_flags =
    -Isrc/lift
    -DPIO_FRAMEWORK_ARDUINO_ENABLE_FREERTOS
upload_protocol = cmsis-dap
debug_tool = cmsis-dap
lib_deps =
    https://github.com/greiman/SdFat
; Libs auto-discovered from lib/: rocket_core, Crc, HX711

[env:lift_tank]
extends = lift_base
build_flags = ${lift_base.build_flags} -DMY_ID=LIFT_TANK_ID

[env:lift_bottle]
extends = lift_base
build_flags = ${lift_base.build_flags} -DMY_ID=LIFT_BOTTLE_ID

[env:lift_thrust]
extends = lift_base
build_flags = ${lift_base.build_flags} -DMY_ID=LIFT_THRUST_ID

; ---------------------------------------------------------------------------
; Navigator — IMU/baro/mag flight navigation computer
; ---------------------------------------------------------------------------
[env:navigator]
extends = rp2040_base
build_src_filter = -<*> +<navigator/>
build_flags = -Isrc/navigator
lib_deps =
    adafruit/Adafruit BMP5xx Library
    adafruit/Adafruit LSM6DS
    adafruit/Adafruit LIS2MDL
    adafruit/Adafruit Unified Sensor
; Libs auto-discovered from lib/: ArduinoEigen, ArxTypeTraits, FastTrig, LPS, SPI

; ---------------------------------------------------------------------------
; PocketSat — standalone atmospheric sensor payload
; ---------------------------------------------------------------------------
[env:pocketsat]
extends = rp2040_base
build_src_filter = -<*> +<pocketsat/>
build_flags = -Isrc/pocketsat
lib_deps =
    adafruit/Adafruit BMP5xx Library
    BME280
    adafruit/Adafruit BusIO
; Libs auto-discovered from lib/: HDC302x, LPS

; ---------------------------------------------------------------------------
; native — host-side unit tests for lib/rocket_core (no board, no Arduino)
; ---------------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
build_flags = -std=c++11
